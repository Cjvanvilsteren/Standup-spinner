<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standup Host Picker — App</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
h1{font-size:1.6rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#f8fafc;margin-top:1.5rem;text-align:center}
h1 span{display:block;font-size:.85rem;font-weight:600;letter-spacing:.12em;color:#94a3b8;margin-top:.25rem}
.home-link{position:fixed;top:1rem;left:1rem;color:#64748b;text-decoration:none;font-size:1.4rem;z-index:100;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);transition:background .2s,color .2s}
.home-link:hover{background:rgba(255,255,255,.15);color:#e2e8f0}
.main{display:flex;flex-direction:column;align-items:center;gap:1.5rem;margin-top:1rem;position:relative}
.wheel-wrap{position:relative;width:420px;height:420px}
canvas{width:420px;height:420px;filter:drop-shadow(0 0 30px rgba(99,102,241,.25))}
.ticker{position:absolute;top:-18px;left:50%;transform:translateX(-50%);z-index:10;width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:34px solid #f59e0b;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4));transition:transform .05s}
.ticker.tick{transform:translateX(-50%) rotate(8deg)}
.spin-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;font-family:inherit;font-size:1.4rem;font-weight:800;padding:.85rem 2.8rem;border-radius:999px;cursor:pointer;letter-spacing:.04em;box-shadow:0 4px 20px rgba(99,102,241,.4);transition:transform .15s,box-shadow .15s}
.spin-btn:hover{transform:scale(1.05);box-shadow:0 6px 28px rgba(99,102,241,.55)}
.spin-btn:active{transform:scale(.97)}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.gear-btn{position:fixed;top:1rem;right:1rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#94a3b8;font-size:1.5rem;width:44px;height:44px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s;z-index:100}
.gear-btn:hover{background:rgba(255,255,255,.15);color:#e2e8f0}
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.panel-overlay.open{opacity:1;pointer-events:all}
.panel{position:fixed;top:0;right:0;bottom:0;width:380px;max-width:90vw;background:#1e293b;z-index:201;transform:translateX(100%);transition:transform .3s ease;padding:2rem 1.5rem;overflow-y:auto;display:flex;flex-direction:column;gap:1.2rem}
.panel-overlay.open .panel{transform:translateX(0)}
.panel h2{font-size:1.1rem;font-weight:700;color:#f8fafc}
.panel label{font-size:.8rem;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.member-list{display:flex;flex-direction:column;gap:.5rem}
.member-row{display:flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:.45rem .65rem}
.member-row.absent{opacity:.45}
.member-row input[type=text]{flex:1;background:transparent;border:none;color:#e2e8f0;font-family:inherit;font-size:.95rem;outline:none}
.member-row button{background:none;border:none;color:#64748b;font-size:1.1rem;cursor:pointer;padding:2px 4px;border-radius:6px;transition:color .15s,background .15s}
.member-row button:hover{color:#f87171;background:rgba(248,113,113,.1)}
.toggle-btn{font-size:.95rem!important}
.toggle-btn:hover{color:#fbbf24!important;background:rgba(251,191,36,.1)!important}
.add-row{display:flex;gap:.5rem}
.add-row input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.5rem .75rem;color:#e2e8f0;font-family:inherit;font-size:.9rem;outline:none}
.add-row input:focus{border-color:#6366f1}
.add-row button{background:#6366f1;color:#fff;border:none;border-radius:8px;padding:.5rem .85rem;font-family:inherit;font-weight:700;cursor:pointer;font-size:.9rem}
.add-row button:hover{background:#818cf8}
.reset-btn{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:#f87171;font-family:inherit;font-weight:600;font-size:.85rem;padding:.55rem 1rem;border-radius:8px;cursor:pointer;transition:background .15s}
.reset-btn:hover{background:rgba(248,113,113,.2)}
.winner-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;background:rgba(0,0,0,.65);opacity:0;pointer-events:none;transition:opacity .4s}
.winner-overlay.show{opacity:1;pointer-events:all}
.winner-card{background:linear-gradient(135deg,#1e293b,#334155);border:2px solid rgba(255,255,255,.1);border-radius:24px;padding:2.5rem 3rem;text-align:center;transform:scale(.8);transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 25px 60px rgba(0,0,0,.5)}
.winner-overlay.show .winner-card{transform:scale(1)}
.winner-card .emoji{font-size:3rem;margin-bottom:.5rem}
.winner-card .name{font-size:2rem;font-weight:900;color:#f8fafc;margin:.5rem 0}
.winner-card .sub{font-size:1.05rem;color:#94a3b8;font-weight:600}
.winner-card .close-btn{margin-top:1.5rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#e2e8f0;font-family:inherit;font-weight:600;font-size:.9rem;padding:.5rem 1.5rem;border-radius:999px;cursor:pointer}
.winner-card .close-btn:hover{background:rgba(255,255,255,.15)}
#confetti{position:fixed;inset:0;z-index:299;pointer-events:none}
.sprint-section{margin-top:.5rem;font-size:.85rem;color:#64748b}
.sprint-section ul{list-style:none;margin-top:.35rem;display:flex;flex-wrap:wrap;gap:.35rem}
.sprint-section li{background:rgba(74,222,128,.1);color:#4ade80;padding:.2rem .6rem;border-radius:6px;font-weight:600;font-size:.8rem}
.history-section{margin-top:.5rem;font-size:.85rem;color:#64748b}
.history-section table{width:100%;border-collapse:collapse;margin-top:.5rem}
.history-section th{text-align:left;color:#94a3b8;font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;padding:.4rem .5rem;border-bottom:1px solid rgba(255,255,255,.08)}
.history-section td{padding:.4rem .5rem;color:#e2e8f0;font-size:.85rem;border-bottom:1px solid rgba(255,255,255,.04)}
.history-section td.week{color:#6366f1;font-weight:700}
.history-section td.name-col{color:#4ade80;font-weight:600}
.del-hist-btn{background:none;border:none;color:#64748b;cursor:pointer;font-size:.9rem;padding:2px 6px;border-radius:4px;transition:color .15s}
.del-hist-btn:hover{color:#f87171}
footer{position:fixed;bottom:1rem;left:0;right:0;text-align:center;color:#64748b;font-size:.75rem;font-weight:600;letter-spacing:.03em;opacity:.6}
</style>
</head>
<body>

<a href="index.html" class="home-link" title="Terug naar teams">&#8592;</a>
<h1>App<span>Standup Host Picker</span></h1>

<div class="main">
  <div class="wheel-wrap">
    <div class="ticker" id="ticker"></div>
    <canvas id="wheel" width="840" height="840"></canvas>
  </div>
  <button class="spin-btn" id="spinBtn" onclick="spin()">Draai!</button>
</div>

<button class="gear-btn" onclick="togglePanel()">&#9881;&#65039;</button>

<div class="panel-overlay" id="panelOverlay" onclick="togglePanel()">
  <div class="panel" onclick="event.stopPropagation()">
    <h2>&#9881;&#65039; Instellingen</h2>
    <label>Teamleden</label>
    <div class="member-list" id="memberList"></div>
    <div class="add-row">
      <input type="text" id="newName" placeholder="Nieuw teamlid..." onkeydown="if(event.key==='Enter')addMember()">
      <button onclick="addMember()">+ Voeg toe</button>
    </div>
    <hr style="border:none;border-top:1px solid rgba(255,255,255,.06)">
    <label>Deze sprint</label>
    <div class="sprint-section" id="sprintSection"></div>
    <button class="reset-btn" onclick="resetSprint()">&#128260; Reset sprint</button>
    <hr style="border:none;border-top:1px solid rgba(255,255,255,.06)">
    <label>Geschiedenis</label>
    <div class="history-section" id="historySection"></div>
  </div>
</div>

<div class="winner-overlay" id="winnerOverlay" onclick="closeWinner()">
  <div class="winner-card" onclick="event.stopPropagation()">
    <div class="emoji">&#127881;</div>
    <div class="name" id="winnerName"></div>
    <div class="sub">is de host deze week!</div>
    <button class="close-btn" onclick="closeWinner()">Sluiten</button>
  </div>
</div>

<canvas id="confetti"></canvas>
<footer>Made by St1n0</footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
var TEAM_SLUG = "app";
var COLORS = ['#6366f1','#8b5cf6','#ec4899','#f43f5e','#f59e0b','#10b981','#06b6d4','#3b82f6','#a855f7','#f97316'];
var DEFAULT_MEMBERS = [
  {name:'Lid 1',active:true},{name:'Lid 2',active:true},{name:'Lid 3',active:true},
  {name:'Lid 4',active:true},{name:'Lid 5',active:true},{name:'Lid 6',active:true}
];

firebase.initializeApp({
  apiKey: "AIzaSyALzWCrO8LBu-zz2nEH4VbgmwtFMytpW08",
  authDomain: "stand-up-picker-a2570.firebaseapp.com",
  databaseURL: "https://stand-up-picker-a2570-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "stand-up-picker-a2570",
  storageBucket: "stand-up-picker-a2570.firebasestorage.app",
  messagingSenderId: "404106710989",
  appId: "1:404106710989:web:4433e3bc3f797ece50be84"
});

var db = firebase.database();
var teamRef = db.ref('teams/' + TEAM_SLUG);

var members = [];
var hosted = [];
var history = [];
var spinning = false;
var currentAngle = 0;

var canvas = document.getElementById('wheel');
var ctx = canvas.getContext('2d');
var W = canvas.width, CX = W/2, CY = W/2, R = W/2 - 30;

function getWeekNumber(d) {
  d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
  var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

teamRef.on('value', function(snapshot) {
  var data = snapshot.val();
  if (data) {
    members = data.members || JSON.parse(JSON.stringify(DEFAULT_MEMBERS));
    hosted = data.hosted || [];
    history = data.history || [];
  } else {
    members = JSON.parse(JSON.stringify(DEFAULT_MEMBERS));
    hosted = [];
    history = [];
    teamRef.set({ members: members, hosted: hosted, history: history });
  }
  drawWheel(currentAngle);
  if (document.getElementById('panelOverlay').classList.contains('open')) renderPanel();
});

function save(){ teamRef.set({ members: members, hosted: hosted, history: history }); }
function activeMembers(){ return members.filter(function(m){ return m.active; }); }

function drawWheel(angle){
  var active = activeMembers();
  var n = active.length;
  ctx.clearRect(0,0,W,W);
  if(n === 0){
    ctx.fillStyle='#334155';ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#64748b';ctx.font='600 28px Inter,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Geen actieve leden',CX,CY);return;
  }
  var sliceAngle = (Math.PI*2)/n;
  for(var i=0;i<n;i++){
    var start = angle + i*sliceAngle;
    var end = start + sliceAngle;
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,start,end);ctx.closePath();
    ctx.fillStyle=COLORS[i%COLORS.length];ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.15)';ctx.lineWidth=2;ctx.stroke();
    var mid = start + sliceAngle/2;
    var tx = CX + Math.cos(mid)*(R*0.65);
    var ty = CY + Math.sin(mid)*(R*0.65);
    ctx.save();ctx.translate(tx,ty);ctx.rotate(mid);
    var mname = active[i].name;
    var isHosted = hosted.indexOf(mname) !== -1;
    ctx.fillStyle = isHosted ? 'rgba(255,255,255,.7)' : '#fff';
    var fontSize = n <= 8 ? 26 : n <= 12 ? 20 : 16;
    ctx.font = '700 ' + fontSize + 'px Inter,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText((isHosted ? '\u2713 ' : '') + mname, 0, 0);
    ctx.restore();
  }
  ctx.beginPath();ctx.arc(CX,CY,38,0,Math.PI*2);ctx.fillStyle='#1e293b';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='#94a3b8';ctx.font='600 18px Inter,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('\uD83C\uDFAF',CX,CY);
}

function spin(){
  var active = activeMembers();
  if(active.length < 2 || spinning) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;
  var n = active.length;
  var sliceAngle = (Math.PI*2)/n;
  var totalSpin = Math.PI*2 * (5 + Math.random()*5) + Math.random()*Math.PI*2;
  var duration = 4000 + Math.random()*1500;
  var startTime = performance.now();
  var startAngle = currentAngle;
  var ticker = document.getElementById('ticker');
  var lastSegment = -1;
  function easeOutQuart(t){ return 1 - Math.pow(1-t,4); }
  function animate(now){
    var elapsed = now - startTime;
    var t = Math.min(elapsed/duration, 1);
    var eased = easeOutQuart(t);
    currentAngle = startAngle + totalSpin * eased;
    drawWheel(currentAngle);
    var normAngle = (((-currentAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2));
    var seg = Math.floor(normAngle / sliceAngle);
    if(seg !== lastSegment){
      lastSegment = seg;
      ticker.classList.add('tick');
      setTimeout(function(){ ticker.classList.remove('tick'); }, 50);
    }
    if(t < 1){ requestAnimationFrame(animate); }
    else {
      spinning = false;
      document.getElementById('spinBtn').disabled = false;
      var pointerAngle = -Math.PI/2;
      var rel = (((pointerAngle - currentAngle) % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
      var winIdx = Math.floor(rel / sliceAngle);
      var winner = active[winIdx].name;
      var now2 = new Date();
      var week = getWeekNumber(now2);
      var year = now2.getFullYear();
      if(hosted.indexOf(winner) === -1){ hosted.push(winner); }
      history.push({ name: winner, week: week, year: year });
      save();
      setTimeout(function(){ showWinner(winner); }, 300);
    }
  }
  requestAnimationFrame(animate);
}

function showWinner(name){
  document.getElementById('winnerName').textContent = name;
  document.getElementById('winnerOverlay').classList.add('show');
  fireConfetti();
}
function closeWinner(){
  document.getElementById('winnerOverlay').classList.remove('show');
  renderPanel();
}

function fireConfetti(){
  var c = document.getElementById('confetti');
  c.width = window.innerWidth; c.height = window.innerHeight;
  var cx = c.getContext('2d');
  var pieces = [];
  for(var i=0;i<150;i++) pieces.push({
    x: c.width/2, y: c.height/2,
    vx: (Math.random()-.5)*25, vy: Math.random()*-18 - 5,
    r: Math.random()*6+3,
    color: COLORS[Math.floor(Math.random()*COLORS.length)],
    rot: Math.random()*Math.PI*2,
    rv: (Math.random()-.5)*.3,
    life: 1
  });
  var frame = 0;
  function draw(){
    cx.clearRect(0,0,c.width,c.height);
    var alive = false;
    for(var j=0;j<pieces.length;j++){
      var p = pieces[j];
      if(p.life <= 0) continue;
      alive = true;
      p.x += p.vx; p.y += p.vy; p.vy += .45; p.rot += p.rv;
      p.life -= .008; p.vx *= .99;
      cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);
      cx.globalAlpha = Math.max(0,p.life);
      cx.fillStyle = p.color;
      cx.fillRect(-p.r/2,-p.r,p.r,p.r*2);
      cx.restore();
    }
    if(alive && frame++ < 300) requestAnimationFrame(draw);
    else cx.clearRect(0,0,c.width,c.height);
  }
  requestAnimationFrame(draw);
}

function togglePanel(){
  document.getElementById('panelOverlay').classList.toggle('open');
  renderPanel();
}

function renderPanel(){
  var list = document.getElementById('memberList');
  list.innerHTML = '';
  members.forEach(function(m,i){
    var row = document.createElement('div');
    row.className = 'member-row' + (m.active ? '' : ' absent');
    var inp = document.createElement('input');
    inp.type = 'text'; inp.value = m.name;
    inp.onchange = function(){ renameMember(i, this.value); };
    var togBtn = document.createElement('button');
    togBtn.className = 'toggle-btn';
    togBtn.title = m.active ? 'Zet afwezig' : 'Zet actief';
    togBtn.textContent = m.active ? '\uD83D\uDC41\uFE0F' : '\uD83D\uDCA4';
    togBtn.onclick = function(){ toggleMember(i); };
    var delBtn = document.createElement('button');
    delBtn.title = 'Verwijder';
    delBtn.textContent = '\u2715';
    delBtn.onclick = function(){ removeMember(i); };
    row.appendChild(inp);
    row.appendChild(togBtn);
    row.appendChild(delBtn);
    list.appendChild(row);
  });

  var sprint = document.getElementById('sprintSection');
  if(hosted.length === 0){
    sprint.innerHTML = '<em>Nog niemand gehost deze sprint.</em>';
  } else {
    sprint.innerHTML = '<ul>' + hosted.map(function(h){ return '<li>\u2713 ' + h + '</li>'; }).join('') + '</ul>';
  }

  var hist = document.getElementById('historySection');
  if(history.length === 0){
    hist.innerHTML = '<em>Nog geen geschiedenis.</em>';
  } else {
    var rows = history.slice().reverse().map(function(entry,idx){
      var ri = history.length - 1 - idx;
      return '<tr><td class="week">Week ' + entry.week + '</td><td class="name-col">' + entry.name + '</td><td>' + entry.year + '</td><td><button class="del-hist-btn" onclick="removeHistory(' + ri + ')">\u2715</button></td></tr>';
    }).join('');
    hist.innerHTML = '<table><thead><tr><th>Week</th><th>Host</th><th>Jaar</th><th></th></tr></thead><tbody>' + rows + '</tbody></table>';
  }
}

function addMember(){
  var input = document.getElementById('newName');
  var name = input.value.trim();
  if(!name) return;
  members.push({name: name, active: true});
  input.value = '';
  save(); renderPanel();
}
function removeMember(i){ members.splice(i,1); save(); renderPanel(); }
function renameMember(i,v){ members[i].name = v.trim() || members[i].name; save(); renderPanel(); }
function toggleMember(i){ members[i].active = !members[i].active; save(); renderPanel(); }
function removeHistory(i){ history.splice(i,1); save(); renderPanel(); }
function resetSprint(){ hosted = []; save(); renderPanel(); }

drawWheel(currentAngle);
</script>
</body>
</html>
