<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standup Host Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#ffffff;color:#1B0A5C;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
h1{font-size:2rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#1B0A5C;margin-bottom:.5rem}
p{color:#6b5b95;margin-bottom:2.5rem;font-size:1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;max-width:700px;width:90%}
a.team-link{text-decoration:none;background:#FDE8EF;border:2px solid rgba(228,0,110,.12);border-radius:16px;padding:1.5rem;text-align:center;color:#1B0A5C;font-weight:700;font-size:1.15rem;transition:background .2s,transform .15s,box-shadow .2s}
a.team-link:hover{background:#f9d0e0;transform:translateY(-2px);box-shadow:0 8px 24px rgba(228,0,110,.15)}
a.team-link span{display:block;font-size:2rem;margin-bottom:.5rem}

.admin-btn{position:fixed;bottom:1.5rem;right:1.5rem;background:#FDE8EF;border:2px solid rgba(228,0,110,.12);color:#1B0A5C;font-size:1.2rem;width:44px;height:44px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.admin-btn:hover{background:#f9d0e0}

.modal-overlay{position:fixed;inset:0;background:rgba(27,10,92,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:center;justify-content:center}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border:2px solid rgba(228,0,110,.1);border-radius:20px;padding:2rem;width:400px;max-width:90vw;display:flex;flex-direction:column;gap:1.2rem;box-shadow:0 20px 60px rgba(27,10,92,.15)}
.modal h2{font-size:1.1rem;font-weight:700;color:#1B0A5C;margin:0}
.modal label{font-size:.8rem;color:#6b5b95;font-weight:600;text-transform:uppercase;letter-spacing:.06em}

.pw-row{display:flex;gap:.5rem}
.pw-row input{flex:1;background:#FDE8EF;border:2px solid rgba(228,0,110,.15);border-radius:8px;padding:.55rem .75rem;color:#1B0A5C;font-family:inherit;font-size:.9rem;outline:none}
.pw-row input:focus{border-color:#E4006E}
.pw-row button{background:#E4006E;color:#fff;border:none;border-radius:8px;padding:.55rem 1rem;font-family:inherit;font-weight:700;cursor:pointer;font-size:.9rem}
.pw-row button:hover{background:#c70060}

.admin-panel{display:none;flex-direction:column;gap:1rem}
.admin-panel.unlocked{display:flex}

.reset-row{display:flex;align-items:center;justify-content:space-between;background:#FDE8EF;border:1px solid rgba(228,0,110,.1);border-radius:10px;padding:.6rem .8rem}
.reset-row .team-name{font-weight:600;color:#1B0A5C;font-size:.95rem}
.reset-row .reset-btns{display:flex;gap:.4rem}
.reset-small{background:rgba(228,0,110,.1);border:1px solid rgba(228,0,110,.2);color:#E4006E;font-family:inherit;font-weight:600;font-size:.75rem;padding:.3rem .6rem;border-radius:6px;cursor:pointer;transition:background .15s}
.reset-small:hover{background:rgba(228,0,110,.2)}
.reset-all{background:#E4006E;border:none;color:#fff;font-family:inherit;font-weight:700;font-size:.85rem;padding:.55rem 1rem;border-radius:8px;cursor:pointer;transition:background .15s;width:100%}
.reset-all:hover{background:#c70060}

.pw-error{color:#E4006E;font-size:.85rem;display:none}
.pw-error.show{display:block}
.success-msg{color:#10b981;font-size:.85rem;display:none}
.success-msg.show{display:block}
</style>
</head>
<body>
<h1>Standup Host Picker</h1>
<p>Kies je team</p>
<div class="grid">
  <a class="team-link" href="design.html"><span>🎨</span>Design</a>
  <a class="team-link" href="app.html"><span>📱</span>App</a>
  <a class="team-link" href="web.html"><span>🌐</span>Web</a>
  <a class="team-link" href="klantenservice-tooling.html"><span>🛠️</span>Klantenservice Tooling</a>
  <a class="team-link" href="egain.html"><span>💬</span>eGain</a>
</div>

<button class="admin-btn" onclick="openAdmin()" title="Admin">🔒</button>

<div class="modal-overlay" id="adminOverlay" onclick="closeAdmin()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>🔒 Scrum Master Admin</h2>
    <div id="loginSection">
      <label>Wachtwoord</label>
      <div class="pw-row">
        <input type="password" id="pwInput" placeholder="Voer wachtwoord in..." onkeydown="if(event.key==='Enter')checkPassword()">
        <button onclick="checkPassword()">Unlock</button>
      </div>
      <div class="pw-error" id="pwError">Verkeerd wachtwoord!</div>
    </div>
    <div class="admin-panel" id="adminPanel">
      <label>Reset per team</label>
      <div class="reset-row">
        <span class="team-name">🎨 Design</span>
        <div class="reset-btns">
          <button class="reset-small" onclick="resetTeam('design','sprint')">Sprint</button>
          <button class="reset-small" onclick="resetTeam('design','history')">Geschiedenis</button>
          <button class="reset-small" onclick="resetTeam('design','all')">Alles</button>
        </div>
      </div>
      <div class="reset-row">
        <span class="team-name">📱 App</span>
        <div class="reset-btns">
          <button class="reset-small" onclick="resetTeam('app','sprint')">Sprint</button>
          <button class="reset-small" onclick="resetTeam('app','history')">Geschiedenis</button>
          <button class="reset-small" onclick="resetTeam('app','all')">Alles</button>
        </div>
      </div>
      <div class="reset-row">
        <span class="team-name">🌐 Web</span>
        <div class="reset-btns">
          <button class="reset-small" onclick="resetTeam('web','sprint')">Sprint</button>
          <button class="reset-small" onclick="resetTeam('web','history')">Geschiedenis</button>
          <button class="reset-small" onclick="resetTeam('web','all')">Alles</button>
        </div>
      </div>
      <div class="reset-row">
        <span class="team-name">🛠️ Klantenservice Tooling</span>
        <div class="reset-btns">
          <button class="reset-small" onclick="resetTeam('klantenservice-tooling','sprint')">Sprint</button>
          <button class="reset-small" onclick="resetTeam('klantenservice-tooling','history')">Geschiedenis</button>
          <button class="reset-small" onclick="resetTeam('klantenservice-tooling','all')">Alles</button>
        </div>
      </div>
      <div class="reset-row">
        <span class="team-name">💬 eGain</span>
        <div class="reset-btns">
          <button class="reset-small" onclick="resetTeam('egain','sprint')">Sprint</button>
          <button class="reset-small" onclick="resetTeam('egain','history')">Geschiedenis</button>
          <button class="reset-small" onclick="resetTeam('egain','all')">Alles</button>
        </div>
      </div>
      <hr style="border:none;border-top:1px solid rgba(228,0,110,.1)">
      <button class="reset-all" onclick="resetEverything()">🗑️ Reset ALLES voor alle teams</button>
      <div class="success-msg" id="successMsg">✓ Gelukt!</div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyALzWCrO8LBu-zz2nEH4VbgmwtFMytpW08",
  authDomain: "stand-up-picker-a2570.firebaseapp.com",
  databaseURL: "https://stand-up-picker-a2570-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "stand-up-picker-a2570",
  storageBucket: "stand-up-picker-a2570.firebasestorage.app",
  messagingSenderId: "404106710989",
  appId: "1:404106710989:web:4433e3bc3f797ece50be84"
});

var db = firebase.database();
var TEAMS = ['design','app','web','klantenservice-tooling','egain'];
var DEFAULT_MEMBERS = [
  {name:'Lid 1',active:true},{name:'Lid 2',active:true},{name:'Lid 3',active:true},
  {name:'Lid 4',active:true},{name:'Lid 5',active:true},{name:'Lid 6',active:true}
];

function openAdmin(){
  document.getElementById('adminOverlay').classList.add('open');
  document.getElementById('pwInput').value = '';
  document.getElementById('pwError').classList.remove('show');
  document.getElementById('loginSection').style.display = '';
  document.getElementById('adminPanel').classList.remove('unlocked');
  document.getElementById('pwInput').focus();
}
function closeAdmin(){
  document.getElementById('adminOverlay').classList.remove('open');
  document.getElementById('adminPanel').classList.remove('unlocked');
}
function checkPassword(){
  var pw = document.getElementById('pwInput').value;
  if(pw === 'Counterstrike'){
    document.getElementById('adminPanel').classList.add('unlocked');
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('pwError').classList.remove('show');
  } else {
    document.getElementById('pwError').classList.add('show');
  }
}
function showSuccess(){
  var el = document.getElementById('successMsg');
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2000);
}
function resetTeam(slug, mode){
  var ref = db.ref('teams/' + slug);
  if(mode === 'sprint'){ ref.child('hosted').set([]); showSuccess(); }
  else if(mode === 'history'){ ref.child('history').set([]); showSuccess(); }
  else if(mode === 'all'){ ref.set({ members: DEFAULT_MEMBERS, hosted: [], history: [] }); showSuccess(); }
}
function resetEverything(){
  if(!confirm('Weet je zeker dat je ALLES wilt resetten voor alle teams?')) return;
  TEAMS.forEach(function(slug){ db.ref('teams/' + slug).set({ members: DEFAULT_MEMBERS, hosted: [], history: [] }); });
  showSuccess();
}
</script>
</body>
</html>
